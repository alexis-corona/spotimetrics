<!--
Project: Spotimetrics
Description: Main HTML entry point for the Spotimetrics dashboard. Defines the 
semantic structure for the UI, including the navigation bar, view selectors, and the 
dynamic container for Spotify data orchestration.

This file integrates with external CSS for styling and JavaScript for handling 
OAuth 2.0 authentication, API requests, and DOM manipulation.

Author: Alexis Corona
Version: 1.0.0 (stable)
-->

<!-- Declares the document type as HTML5 -->
<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Ensures proper text encoding (supports special characters) -->
  <meta charset="UTF-8">
  <!-- Makes the layout responsive on mobile devices -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Title shown in the browser tab -->
  <title>Spotimetrics</title>

  <!-- Sets the favicon (icon in the browser tab) -->
  <link rel="icon" href="img/favicon-32x32.png" type="image/png">
  <!-- Links the external CSS file for styling -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navigation bar at the top -->
  <header class="navbar">

    <!-- Link to GitHub profile -->
    <a href="https://github.com/alexis-corona" target="_blank" rel="noopener noreferrer" class="github-link">
      <img src="./img/github.svg" alt="GitHub" class="github-img">
    </a>

    <!-- Container for switching between views -->
    <div class="selector-container">
      <!-- Button to show tracks (active by default) -->
      <button class="view-btn active" data-type="tracks">Tracks</button>
      <!-- Button to show artists -->
      <button class="view-btn" data-type="artists">Artists</button>
    </div>

    <!-- Button to log in with Spotify -->
    <button id="login">Sign in with Spotify</button>
  </header>

  <!-- Main content area where dynamic data (tracks or artists) will be displayed -->
  <main id="content" class="content-grid"></main>

  <!-- Links the JavaScript file for functionality -->
  <script src="script.js"></script>
</body>
</html>
